name: build
on:
  push:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v4

      - name: tidy
        run: go mod tidy

      - name: build all
        run: |
          mkdir -p upload
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o upload/gh-mirror_linux_amd64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o upload/gh-mirror_linux_arm64
          GOOS=linux GOARCH=386 go build -ldflags="-s -w" -o upload/gh-mirror_linux_386
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o upload/gh-mirror_windows_amd64.exe
          GOOS=windows GOARCH=386 go build -ldflags="-s -w" -o upload/gh-mirror_windows_386.exe

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: gh-mirror
          path: upload